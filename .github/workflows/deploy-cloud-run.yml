name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      region:
        description: "Google Cloud region"
        default: "europe-west6"
        required: true
      service:
        description: "Cloud Run service name"
        default: "vaudtaxai-web"
        required: true
      repository:
        description: "Artifact Registry repository"
        default: "vaudtaxai"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ inputs.region || 'europe-west6' }}
      CLOUD_RUN_SERVICE: ${{ inputs.service || 'vaudtaxai-web' }}
      ARTIFACT_REPOSITORY: ${{ inputs.repository || 'vaudtaxai' }}
      IMAGE_NAME: vaudtaxai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-cloudrun.txt
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe "${ARTIFACT_REPOSITORY}" --location="${GCP_REGION}" \
            || gcloud artifacts repositories create "${ARTIFACT_REPOSITORY}" \
              --repository-format=docker \
              --location="${GCP_REGION}" \
              --description="VaudTaxAI Cloud Run images"

      - name: Build image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" .
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Push image
        run: docker push "${IMAGE}"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image="${IMAGE}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=4Gi \
            --cpu=2 \
            --min-instances=1 \
            --concurrency=50 \
            --max-instances=3

      - name: Build and Push UI image
        run: |
          UI_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/vaudtaxai-ui:${GITHUB_SHA}"
          docker build -t "${UI_IMAGE}" -f "Vaud Tax Guide/Dockerfile.ui" "Vaud Tax Guide"
          docker push "${UI_IMAGE}"
          echo "UI_IMAGE=${UI_IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy UI to Cloud Run
        run: |
          gcloud run deploy "vaudtaxai-ui" \
            --image="${UI_IMAGE}" \
            --region="${GCP_REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --memory=2Gi \
            --cpu=1 \
            --min-instances=1 \
            --set-env-vars="VITE_API_BASE_URL=https://vaudtaxai-web-410743045655.europe-west6.run.app"
