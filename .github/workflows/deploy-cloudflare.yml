name: Deploy UI to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - "Vaud Tax Guide/**"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Vaud Tax Guide"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Cloudflare Workers target)
        env:
          VITE_API_BASE_URL: https://api.tax-gpt.online
        run: bun run build

      - name: Show wrangler context
        run: |
          echo "PWD: $(pwd)"
          ls -la
          if [ -d dist/server ]; then ls -la dist/server; fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "Vaud Tax Guide"
          wranglerVersion: "4.84.1"
          command: deploy --log-level debug

      - name: Upload wrangler debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-logs
          path: ~/.config/.wrangler/logs/
          if-no-files-found: ignore
          retention-days: 7
