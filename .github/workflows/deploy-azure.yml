name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-cloudrun.txt
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Verify Secrets
        run: |
          echo "Checking secret availability..."
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "✅ AZURE_CLIENT_ID is present (Length: ${#CLIENT_ID})"
          else
            echo "❌ AZURE_CLIENT_ID IS MISSING"
          fi
          if [ -n "${{ secrets.AZURE_TENANT_ID }}" ]; then
            echo "✅ AZURE_TENANT_ID is present (Length: ${#TENANT_ID})"
          else
            echo "❌ AZURE_TENANT_ID IS MISSING"
          fi
          if [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "✅ AZURE_SUBSCRIPTION_ID is present (Length: ${#SUBS_ID})"
          else
            echo "❌ AZURE_SUBSCRIPTION_ID IS MISSING"
          fi
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SUBS_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and Push API to ACR
        run: |
          az acr build --registry acrvaudtaxai --image vaudtaxai-api:${{ github.sha }} .

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --name aca-vaudtaxai-api \
            --resource-group rg-vaudtaxai \
            --image acrvaudtaxai.azurecr.io/vaudtaxai-api:${{ github.sha }}

      - name: Build and Push UI to ACR
        run: |
          az acr build --registry acrvaudtaxai --image vaudtaxai-ui:${{ github.sha }} \
            --build-arg VITE_API_BASE_URL=https://api.tax-gpt.online \
            -f "Vaud Tax Guide/Dockerfile.ui" "Vaud Tax Guide"

      - name: Deploy UI to Container Apps
        run: |
          az containerapp update \
            --name aca-vaudtaxai-ui \
            --resource-group rg-vaudtaxai \
            --image acrvaudtaxai.azurecr.io/vaudtaxai-ui:${{ github.sha }}
